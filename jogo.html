  <title>Jogo da Velha</title>
      <link rel="stylesheet" href="assets/style.css" />

  <style>
    .board { display: grid; grid-template-columns: repeat(3, 100px); gap: 5px; }
    .cell { width: 100px; height: 100px; background: white; border: 3px solid #333; display: grid; place-items: center; font-size: 3rem; cursor: pointer; user-select: none; }
    .cell:hover { background: #f0f0f0; }
    .status { margin-top: 1rem; font-size: 1.1rem; }
    .controls { margin-top: 1rem; }
    button { padding: 0.5rem 1rem; font-size: 1rem; cursor: pointer; }
  </style>
  <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.0/css/all.min.css"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
</head>

              style="width: 50px; height: 50px"

            <a class="navbar-brand" href="index.html"><h1>Luiz Henrique Lima da Silva</h1></a>
          </div>
          <button
            class="navbar-toggler"

          </button>
          <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto mb-2 mb-lg-0">
              <li class="nav-item">
                <a class="nav-link" href="index.html"

    <main>
        <div class="container py-4">
            <h1>Jogo da Velha</h1>
            <div class="board" id="board"></div>
            <div class="status" id="status"></div>
            <div class="controls"><button id="resetButton">Reiniciar</button></div>
        </div>
